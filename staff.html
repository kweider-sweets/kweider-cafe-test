<!doctype html><html lang="en" dir="ltr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#000"><title>Kweider Rewards Staff</title><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png"><link rel="stylesheet" href="assets/css/app-shell.css"></head><body class="app-page"><main class="app-shell"><div class="app-topbar"><a class="app-brand" href="index.html"><img src="logo.webp"><span class="demo-badge">STAFF DEMO</span></a><a href="index.html" class="app-back">← Menu</a></div><header class="page-heading"><h1>Rewards Staff</h1><p>Add points and redeem rewards. This first build stores test data in this browser only.</p></header><section id="loginCard" class="app-card"><h2>Staff access</h2><div class="field"><label>Development PIN</label><input id="staffPin" type="password" inputmode="numeric" autocomplete="off"></div><div class="form-actions"><button id="staffLogin" class="primary-btn">Open staff panel</button></div><div class="notice info">Testing PIN: <strong>1969</strong>. Replace this with secure server authentication before public launch.</div></section><section id="staffPanel" class="hidden"><div class="app-card"><h2>Find member</h2><div class="field"><label>Member ID or phone number</label><input id="memberSearch" placeholder="KW-..., 07..., +44... or 0044..."></div><div class="form-actions"><button id="findMember" class="primary-btn">Find member</button><button id="scanQr" class="ghost-btn">Scan QR</button></div><div id="scanArea" class="hidden"><video id="scannerVideo" class="scanner-video" playsinline muted></video><div class="form-actions"><button id="stopScan" class="danger-btn">Stop camera</button></div></div><div id="staffMessage"></div></div><div id="memberPanel" class="hidden"><div class="app-card"><div class="split"><div><h2 id="staffMemberName"></h2><p id="staffMemberMeta" style="color:#bbb;line-height:1.7"></p></div><div class="metric"><strong id="staffPoints">0</strong><span>CURRENT POINTS</span></div></div></div><div class="app-card"><h3>Add purchase points</h3><div class="form-grid"><div class="field"><label>Purchase amount (£)</label><input id="purchaseAmount" type="number" min="0.01" step="0.01"></div><div class="field"><label>Receipt number</label><input id="earnReceipt"></div></div><div class="form-actions"><button id="addPoints" class="primary-btn">Add points</button></div></div><div class="app-card"><h3>Redeem reward</h3><div class="form-grid"><div class="field"><label>Number of £5 rewards</label><select id="rewardCount"><option value="1">1 × £5</option><option value="2">2 × £5</option><option value="3">3 × £5</option></select></div><div class="field"><label>Receipt/reference</label><input id="redeemReceipt"></div></div><div class="form-actions"><button id="redeemReward" class="gold-btn">Redeem</button></div></div></div></section></main><script src="assets/js/loyalty-service.js?v=2.0.0"></script><script src="assets/js/app-shell.js"></script><script>
const $=id=>document.getElementById(id);let member=null,stream=null,scanning=false;function msg(t,type='info'){$('staffMessage').innerHTML=`<div class="notice ${type}">${t}</div>`}function render(m){member=m;$('memberPanel').classList.remove('hidden');$('staffMemberName').textContent=m.firstName;$('staffMemberMeta').textContent=`${m.id} · ${m.phone}`;$('staffPoints').textContent=m.points||0}function search(v){v=String(v||'').replace(/^KWEIDER-LOYALTY:/,'');const m=KweiderRewards.getMember(v);if(!m){member=null;$('memberPanel').classList.add('hidden');msg('Member not found.','error');return}render(m);msg('Member found. Check the name before continuing.','ok')}
$('staffLogin').onclick=()=>{if($('staffPin').value!=='1969'){alert('Incorrect development PIN.');return}$('loginCard').classList.add('hidden');$('staffPanel').classList.remove('hidden')};$('findMember').onclick=()=>search($('memberSearch').value);$('addPoints').onclick=()=>{if(!member)return;try{const r=KweiderRewards.addPoints(member.id,$('purchaseAmount').value,$('earnReceipt').value,'Staff Demo');render(r.member);msg(`${r.transaction.points} points added successfully.`,'ok');$('purchaseAmount').value='';$('earnReceipt').value=''}catch(e){msg(e.message,'error')}};$('redeemReward').onclick=()=>{if(!member)return;const count=Number($('rewardCount').value);if(!confirm(`Redeem £${count*5} for ${member.firstName}?`))return;try{const r=KweiderRewards.redeem(member.id,count,$('redeemReceipt').value,'Staff Demo');render(r.member);msg('Reward redeemed successfully.','ok');$('redeemReceipt').value=''}catch(e){msg(e.message,'error')}};
async function stopCamera(){scanning=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('scanArea').classList.add('hidden')}$('stopScan').onclick=stopCamera;$('scanQr').onclick=async()=>{if(!('BarcodeDetector'in window)){msg('Camera QR scanning is not supported by this browser. Enter the member ID manually.','error');return}try{const formats=await BarcodeDetector.getSupportedFormats();if(!formats.includes('qr_code'))throw new Error('QR scanning is unavailable.');const detector=new BarcodeDetector({formats:['qr_code']});stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});$('scannerVideo').srcObject=stream;await $('scannerVideo').play();$('scanArea').classList.remove('hidden');scanning=true;const loop=async()=>{if(!scanning)return;try{const codes=await detector.detect($('scannerVideo'));if(codes.length){$('memberSearch').value=codes[0].rawValue;await stopCamera();search(codes[0].rawValue);return}}catch(e){}requestAnimationFrame(loop)};loop()}catch(e){msg('Could not open the camera. Enter the member ID manually.','error')}};
</script></body></html>
